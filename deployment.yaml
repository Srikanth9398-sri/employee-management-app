apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee-app
      version: blue  
  template:
    metadata:
      labels:
        app: employee-app
        version: blue  
    spec:
      containers:
      - name: employee-app
        image: srikanth7036/employee-app:latest
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: employee-app-service
spec:
  type: NodePort
  selector:
    app: employee-app
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
      nodePort: 30081
